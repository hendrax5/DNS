<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <script>
      window.onerror = function(m, s, l, c, e) {
        document.body.innerHTML += '<h1 style="color:red;z-index:9999;position:fixed;top:0;background:white;padding:20px;width:100%;">' + m + '</h1>';
      };
      window.onunhandledrejection = function(e) {
        document.body.innerHTML += '<h1 style="color:red;z-index:9999;position:fixed;top:0;background:white;padding:20px;width:100%;">' + e.reason + '</h1>';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
