version: '3.8'

services:
  netshield-dns:
    build: .
    container_name: netshield-v2
    restart: always
    ports:
      - "53:53/udp"
      - "53:53/tcp"
      - "80:80/tcp"
    tmpfs:
      - /var/log
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    volumes:
      - ./data:/data
