version: '3.3'

services:
  netshield-dns:
    build:
      context: .
      network: host
    container_name: netshield-v2
    restart: always
    # Host Networking: eliminasi Docker NAT overhead
    # Sysctl tuning dilakukan oleh deploy.sh di level OS
    network_mode: host
    # Privileged mode diperlukan untuk XDP/eBPF
    # (load BPF programs ke kernel + akses /sys/fs/bpf)
    privileged: true
    tmpfs:
      - /var/log/netshield
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    volumes:
      - ./data:/data
      - /sys/fs/bpf:/sys/fs/bpf
