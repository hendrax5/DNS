# NetShield DNS v2.0 PowerDNS Recursor Config
local-address=127.0.0.1
local-port=5353
daemon=no
security-poll-suffix=

# API & Control
webserver=yes
webserver-address=127.0.0.1
webserver-port=8081
webserver-password=netshield-secret
api-key=netshield-secret

# Performance & Caching (Carrier-Grade Optimization)
max-cache-entries=10000000
max-packetcache-entries=10000000
threads=16
# Kerana DNSDist di depan mengalirkan data melalui 16 pipa berbeda secara native (sockets=16),
# Kernel Linux akan menjabarkan SO_REUSEPORT dengan sempurna tanpa resiko Thread Starvation.
reuseport=yes
pdns-distributes-queries=no
max-mthreads=4096
max-tcp-clients=2048
tcp-fast-open=256
serve-rfc1918=yes
edns-subnet-allow-list=

# Stale Serving: Sajikan cache basi hingga 5 menit sambil refresh di background
serve-stale-extensions=300

# Aggressive Negative Caching: Cache NXDOMAIN responses (domain tidak ada)
# Mengurangi beban upstream untuk domain sampah/typo
max-negative-ttl=600

# Root NX Trust: Jika root server bilang TLD tidak ada, langsung cache
# tanpa bertanya ke TLD server (mengeliminasi 1 round-trip)
root-nx-trust=yes

# Nonaktifkan trace logging internal untuk performa maksimal
quiet=yes
log-common-errors=no

# Include Lua scripts for ACL and RPZ
lua-config-file=/etc/powerdns/laman_labuh.lua

# Security defaults: open up strictly to allow Lua to handle ACL
allow-from=0.0.0.0/0, ::/0

forward-zones-file=/etc/powerdns/forward_zones.txt
