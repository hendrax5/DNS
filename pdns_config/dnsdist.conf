-- ══════════════════════════════════════════════════════════
-- BAGIAN 6: TELEMETRI ASINKRON (C++ Native Sampling)
-- ══════════════════════════════════════════════════════════

-- Penulis log murni (dipanggil HANYA untuk 1% terpilih oleh C++)
function telemetry_writer(dq)
    local f = io.open("/var/log/netshield/pdns-queries.log", "a")
    if f then
        local ip = dq.remoteaddr:toString()
        local ip_clean = string.match(ip, "^[0-9%.]+")
        if not ip_clean then ip_clean = ip end
        local qname = dq.qname:toString()
        local t = os.time()
        f:write('{"time":'..t..', "ip":"'..ip_clean..'", "qname":"'..qname..'", "type":'..dq.qtype..', "action":"ALLOW"}\n')
        f:close()
    end
    return DNSAction.None
end

-- ══════════════════════════════════════════════════════════
-- BAGIAN 7: RANTAI AKSI (Action Chain)
-- ══════════════════════════════════════════════════════════

-- ProbaRule(0.01) = C++ native filter. Hanya 1% paket yang menyentuh Lua.
-- 99% paket TIDAK PERNAH melewati batas C++↔Lua = ZERO OVERHEAD!
addAction(ProbaRule(0.01), LuaAction(telemetry_writer))

-- Forward semua ke PowerDNS
addAction(AllRule(), PoolAction("backend"))
