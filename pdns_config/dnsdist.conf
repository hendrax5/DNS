-- Multi-Thread SO_REUSEPORT Listener otomatis (12 Cores Tuning)
for i=1,12 do
    if i == 1 then
        setLocal('0.0.0.0:53', {reusePort=true})
    else
        addLocal('0.0.0.0:53', {reusePort=true})
    end
end

-- Optimasi UDP & Outstanding
pcall(setUDPMultipleMessagesVectorSize, 64)
pcall(setMaxUDPOutstanding, 65535)
pcall(setRingBuffersSize, 200000)
setACL({'0.0.0.0/0', '::/0'})

