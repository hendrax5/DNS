-- Multi-Thread SO_REUSEPORT Listener otomatis (16 Cores)
for i=1,16 do
    if i == 1 then
        setLocal('0.0.0.0:53', {reusePort=true})
    else
        addLocal('0.0.0.0:53', {reusePort=true})
    end
end

-- Optimasi UDP & Outstanding
setUDPMultipleMessagesVectorSize(32)
setMaxUDPOutstanding(65535)
setACL({'0.0.0.0/0', '::/0'})

-- Administrasi
setKey("odCw4adPMwaEYslkALNwp4K7UksD3av9TGpDeSge814=")
controlSocket('127.0.0.1:5199')
webserver("127.0.0.1:8083")
setWebserverConfig({password="secret", apiKey="secret"})

-- Register Metric
declareMetric("netshield_bloom_hits", "counter", "Number of queries hitting the bloom filter")
declareMetric("netshield_bloom_bypassed", "counter", "Number of queries bypassing the bloom filter")
declareMetric("netshield_lru_positive_hits", "counter", "Hits on the positive LRU cache (blocked)")
declareMetric("netshield_lru_negative_hits", "counter", "Hits on the negative LRU cache (false positives)")

-- Pools
newServer({address="127.0.0.1:5354", name="unbound-resolver", pool="UNBOUND", sockets=16, checkInterval=10, maxCheckFailures=3})
newServer({address="127.0.0.1:5353", name="pdns-auth", pool="POWERDNS", sockets=4, checkInterval=10, maxCheckFailures=3})

-- PacketCache untuk Unbound (Domain Bersih)
pc = newPacketCache(5000000, {maxTTL=86400, minTTL=30, temporaryFailureTTL=60, staleTTL=300})
getPool("UNBOUND"):setCache(pc)

-- Load Lua FFI Engine
dofile("/etc/powerdns/main.lua")

-- Action Chain
addAction(AllRule(), LuaAction(bloom_router))
