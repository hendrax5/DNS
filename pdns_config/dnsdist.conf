-- NetShield V5.0: Carrier-Grade DNSDist (Full Optimization Suite)

-- ══════════════════════════════════════════════════════════
-- BAGIAN 1: PENDENGAR JARINGAN (Listeners)
-- ══════════════════════════════════════════════════════════

-- DNS Klasik (UDP/TCP Port 53)
setLocal('0.0.0.0:53')

-- DNS-over-TLS (DoT - Port 853)
-- Aktifkan setelah sertifikat TLS tersedia di /etc/powerdns/tls/
-- addTLSLocal('0.0.0.0:853', '/etc/powerdns/tls/cert.pem', '/etc/powerdns/tls/key.pem')

-- DNS-over-HTTPS (DoH - Port 443)
-- Aktifkan setelah sertifikat TLS tersedia di /etc/powerdns/tls/
-- addDOHLocal('0.0.0.0:443', '/etc/powerdns/tls/cert.pem', '/etc/powerdns/tls/key.pem', '/dns-query')

setACL({'0.0.0.0/0', '::/0'})

-- ══════════════════════════════════════════════════════════
-- BAGIAN 2: KONTROL & ADMINISTRASI
-- ══════════════════════════════════════════════════════════

setKey("SuperSecretKey")
controlSocket('127.0.0.1:5199')

-- Prometheus Metrics Endpoint (Siap disambungkan ke Grafana)
-- Aktifkan dengan: webserver("0.0.0.0:8083")
-- Akses: http://<server>:8083/metrics (format Prometheus)

-- ══════════════════════════════════════════════════════════
-- BAGIAN 3: BACKEND POWERDNS
-- ══════════════════════════════════════════════════════════

-- 16 soket paralel menuju PowerDNS untuk distribusi beban kernel SO_REUSEPORT
newServer({address="127.0.0.1:5353", name="pdns-core", pool="backend", sockets=16,
           checkInterval=10, maxCheckFailures=3})

-- ══════════════════════════════════════════════════════════
-- BAGIAN 4: MONSTER CACHING (Lapisan Pertahanan Pertama)
-- ══════════════════════════════════════════════════════════

-- 10 Juta Entri Cache di RAM Depan
-- minTTL=30: Paksa domain bertahan minimal 30 detik meski upstream bilang 0
-- staleTTL=300: Sajikan jawaban basi hingga 5 menit saat backend sibuk
pc = newPacketCache(10000000, {maxTTL=86400, minTTL=30, temporaryFailureTTL=60, staleTTL=300})
getPool("backend"):setCache(pc)

-- ══════════════════════════════════════════════════════════
-- BAGIAN 5: PERLINDUNGAN DDoS (Response Rate Limiting)
-- ══════════════════════════════════════════════════════════

-- Batas 1000 QPS per IP klien (mencegah amplifikasi berlebih)
addAction(MaxQPSIPRule(1000), DropAction())

-- Blokir kueri ANY (sering digunakan untuk serangan amplifikasi)
addAction(QTypeRule(DNSQType.ANY), RCodeAction(DNSRCode.REFUSED))

-- Blokir domain kosong/root langsung
addAction(RegexRule('\\.\\.$'), RCodeAction(DNSRCode.REFUSED))

-- ══════════════════════════════════════════════════════════
-- BAGIAN 6: TELEMETRI ASINKRON (1% Sampling)
-- ══════════════════════════════════════════════════════════

function telemetry_sampler(dq)
    if math.random(1, 100) > 1 then return DNSAction.None end
    local f = io.open("/var/log/netshield/pdns-queries.log", "a")
    if f then
        local ip = dq.remoteaddr:toString()
        local ip_clean = string.match(ip, "^[0-9%.]+")
        if not ip_clean then ip_clean = ip end
        local qname = dq.qname:toString()
        local t = os.time()
        f:write('{"time":'..t..', "ip":"'..ip_clean..'", "qname":"'..qname..'", "type":'..dq.qtype..', "action":"ALLOW"}\n')
        f:close()
    end
    return DNSAction.None
end

-- ══════════════════════════════════════════════════════════
-- BAGIAN 7: RANTAI AKSI (Action Chain)
-- ══════════════════════════════════════════════════════════

-- Urutan eksekusi:
-- 1. DDoS Protection (MaxQPSIPRule) → sudah di atas
-- 2. Telemetri Sampling
addAction(AllRule(), LuaAction(telemetry_sampler))
-- 3. Forward ke PowerDNS
addAction(AllRule(), PoolAction("backend"))
