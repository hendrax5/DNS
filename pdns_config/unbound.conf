server:
    verbosity: 1
    num-threads: 16
    interface: 127.0.0.1@5354
    so-reuseport: yes
    
    # Cache and Memory (Optimized for Pure Resolution)
    msg-cache-slabs: 16
    rrset-cache-slabs: 16
    infra-cache-slabs: 16
    key-cache-slabs: 16
    rrset-cache-size: 1024m
    msg-cache-size: 512m
    
    # TCP/UDP Tuning
    outgoing-range: 8192
    num-queries-per-thread: 4096
    
    # Caching strategies
    prefetch: yes
    prefetch-key: yes
    serve-expired: yes
    
    # Security
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: no
    edns-buffer-size: 1232
    chroot: ""

    # Tweak for speed
    minimal-responses: yes
    rrset-roundrobin: yes
    
    # Access
    access-control: 127.0.0.0/8 allow
